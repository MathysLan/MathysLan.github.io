<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Imitation — multijoueur</title>
<meta name="description" content="Jeu d'imitation multijoueur : regarde la vidéo, imite le son au micro, note les autres.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0a0a12;
    color: #e7e5f4;
    font-family: 'JetBrains Mono', monospace;
    padding: 1.5rem;
  }
  main { width: min(860px, 100%); text-align: center; }
  h1 { font-size: 1.3rem; margin-bottom: .4rem; }
  h1 .a { color: #8b5cf6; }
  .sub { color: #6f6c80; font-size: .75rem; margin-bottom: 2rem; }

  section {
    background: rgba(255, 255, 255, 0.045);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 14px;
    padding: 1.6rem;
  }
  #home, #lobby { max-width: 460px; margin: 0 auto; }
  button {
    font: inherit;
    cursor: pointer;
    background: #8b5cf6;
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: .8rem 1.4rem;
  }
  button:hover { background: #7c3aed; }
  button:disabled { opacity: .4; cursor: default; }
  input {
    font: inherit;
    background: transparent;
    border: 1px solid rgba(255, 255, 255, 0.18);
    border-radius: 10px;
    color: #e7e5f4;
    padding: .8rem 1rem;
    outline: none;
    width: 100%;
  }
  input:focus { border-color: #8b5cf6; }
  .or { color: #6f6c80; font-size: .75rem; margin: 1.1rem 0; }
  .join-row { display: flex; gap: .6rem; }
  .join-row input { width: 8rem; text-align: center; text-transform: uppercase; letter-spacing: .3em; }
  .join-row button { flex: 1; background: transparent; border: 1px solid rgba(255, 255, 255, 0.18); color: #e7e5f4; }
  .join-row button:hover { border-color: #34d399; color: #34d399; background: transparent; }
  .mic-note { color: #6f6c80; font-size: .7rem; margin-top: 1.1rem; }
  #name-input { margin-bottom: 1.1rem; }

  .meta { display: flex; justify-content: space-between; font-size: .75rem; color: #9b98ad; margin-bottom: 1rem; }
  .meta b { color: #34d399; letter-spacing: .2em; }
  ul { list-style: none; text-align: left; font-size: .85rem; }
  li { padding: .5rem .2rem; border-bottom: 1px solid rgba(255,255,255,.06); display: flex; justify-content: space-between; gap: .6rem; }
  .tag { color: #f59e0b; font-size: .7rem; }
  .pts { color: #9b98ad; margin-left: auto; }
  #need-players { color: #6f6c80; font-size: .75rem; margin-top: 1rem; }
  #start { margin-top: 1.2rem; }

  /* --- écran de jeu : scoreboard à gauche, scène à droite --- */
  .game-wrap { display: flex; gap: 1.2rem; align-items: flex-start; text-align: left; }
  #scorepanel {
    flex: 0 0 170px;
    background: #11111c;
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 12px;
    padding: 1rem;
  }
  .sp-title { font-size: .75rem; color: #9b98ad; margin-bottom: .5rem; }
  #scores-live li { border: none; padding: .35rem 0; font-size: .8rem; }
  #scores-live .pts { color: #34d399; font-weight: 700; }
  .stage { flex: 1; text-align: center; min-width: 0; }

  #stage-title { font-size: 1.05rem; margin-bottom: .3rem; }
  #stage-sub { color: #9b98ad; font-size: .8rem; margin-bottom: .8rem; }
  #timer { color: #f59e0b; font-size: .9rem; min-height: 1.3em; margin-bottom: .8rem; }
  #ref-video { width: 100%; max-height: 320px; border-radius: 10px; background: #000; }

  #rec-box { margin-top: 1rem; }
  #rec-btn { background: #ef4444; }
  #rec-btn:hover { background: #dc2626; }
  #rec-btn.armed { animation: pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 50% { opacity: .55; } }
  #rec-status { color: #9b98ad; font-size: .75rem; margin-top: .7rem; min-height: 1.2em; }

  #listen-box { margin-top: 1rem; }
  #listen-name { color: #8b5cf6; font-size: .9rem; margin-bottom: .6rem; min-height: 1.3em; }
  #rate-box { display: flex; gap: .7rem; justify-content: center; margin-top: .8rem; }
  .rate { background: #11111c; border: 1px solid rgba(255,255,255,.15); font-size: 1rem; }
  .rate:hover { border-color: #8b5cf6; background: #171724; }
  #listen-count { color: #6f6c80; font-size: .7rem; margin-top: .7rem; }

  #scores { margin-top: 1rem; }
  #back-lobby { margin-top: 1.2rem; }

  #error { margin-top: 1rem; font-size: .8rem; color: #ef4444; min-height: 1.2em; }
  .back { display: inline-block; margin-top: 1.6rem; color: #6f6c80; font-size: .75rem; text-decoration: none; }
  .back:hover { color: #e7e5f4; }
  [hidden] { display: none !important; }
  @media (max-width: 640px) {
    .game-wrap { flex-direction: column; }
    #scorepanel { width: 100%; flex: none; }
  }
</style>
</head>
<body>
  <main>
    <h1>Imitation<span class="a">.</span></h1>
    <p class="sub">regarde · imite au micro en rythme · note les autres</p>

    <!-- accueil -->
    <section id="home">
      <input id="name-input" maxlength="16" placeholder="ton pseudo" autocomplete="off" spellcheck="false">
      <button id="host">Créer une partie</button>
      <p class="or">— ou —</p>
      <div class="join-row">
        <input id="code-input" maxlength="4" placeholder="CODE" autocomplete="off" spellcheck="false">
        <button id="join">Rejoindre</button>
      </div>
      <p class="mic-note">l'accès micro est demandé à l'entrée : c'est le principe du jeu 🎙</p>
    </section>

    <!-- lobby -->
    <section id="lobby" hidden>
      <div class="meta"><span>room <b id="room-code">····</b></span><span>partage ce code</span></div>
      <ul id="players"></ul>
      <p id="need-players">il faut au moins 2 joueurs</p>
      <button id="start" hidden>Lancer la partie</button>
    </section>

    <!-- jeu : scoreboard live + scène pilotée par les phases serveur -->
    <section id="game" hidden>
      <div class="game-wrap">
        <aside id="scorepanel">
          <p class="sp-title">Score :</p>
          <ul id="scores-live"></ul>
        </aside>
        <div class="stage">
          <p id="stage-title"></p>
          <p id="stage-sub"></p>
          <p id="timer"></p>
          <video id="ref-video" playsinline controls hidden></video>
          <div id="rec-box" hidden>
            <button id="rec-btn">⏺ enregistrer</button>
            <p id="rec-status"></p>
          </div>
          <div id="listen-box" hidden>
            <p id="listen-name"></p>
            <audio id="playback" hidden></audio>
            <div id="rate-box">
              <button class="rate" data-v="2">👍 ×2</button>
              <button class="rate" data-v="1">👍</button>
              <button class="rate" data-v="-1">👎</button>
            </div>
            <p id="listen-count"></p>
          </div>
          <ul id="scores" hidden></ul>
          <button id="back-lobby" hidden>← retour au lobby</button>
        </div>
      </div>
    </section>

    <p id="error"></p>
    <a class="back" href="/">← retour au portfolio</a>
  </main>
  <script src="net.js"></script>
  <script src="app.js"></script>
</body>
</html>
