<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — ORA-00942</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0a0a12;
    color: #e7e5f4;
    font-family: 'JetBrains Mono', monospace;
    padding: 1.5rem;
  }
  .term {
    width: min(640px, 100%);
    background: rgba(255, 255, 255, 0.045);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 14px;
    padding: 2rem 2.2rem;
    font-size: .9rem;
    line-height: 1.9;
  }
  .bar { display: flex; gap: .45rem; margin-bottom: 1.3rem; }
  .bar span { width: 11px; height: 11px; border-radius: 50%; background: #55506e; }
  .bar span:first-child { background: #ef4444; }
  .p { color: #34d399; }
  .q { color: #8b5cf6; }
  .err { color: #ef4444; }
  .dim { color: #6f6c80; font-size: .8rem; }
  a.cmd { color: #e7e5f4; text-decoration: underline; text-underline-offset: 4px; }
  a.cmd:hover { color: #34d399; }
  .caret { color: #34d399; animation: blink 1s steps(1) infinite; }
  @keyframes blink { 50% { opacity: 0; } }
</style>
</head>
<body>
  <main class="term">
    <div class="bar" aria-hidden="true"><span></span><span></span><span></span></div>
    <p class="dim">mathyslan.github.io — session SQL*Plus</p>
    <p><span class="p">SQL&gt;</span> <span class="q">SELECT * FROM pages WHERE url = '<span id="path">…</span>';</span></p>
    <p class="err">ERROR 404 — ORA-00942: table or view does not exist</p>
    <p class="dim">0 rows selected. Cette page n'existe pas, et je ne vais pas casser le modèle pour l'inventer.</p>
    <p style="margin-top:1.1rem"><span class="p">SQL&gt;</span> <a class="cmd" href="/">ROLLBACK; -- retour à l'accueil</a><span class="caret">▍</span></p>
  </main>
  <script>document.getElementById('path').textContent = location.pathname;</script>
</body>
</html>
